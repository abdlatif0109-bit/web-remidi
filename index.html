<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4facfe;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .info {
            text-align: left;
            margin-top: 15px;
        }

        .info p {
            margin: 5px 0;
        }

        .social {
            margin-top: 15px;
        }

        .social a {
            text-decoration: none;
            margin: 5px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 13px;
            transition: 0.3s;
        }

        .social a:hover {
            background: #007bff;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- FOTO -->
        <img src="ahmad.jpg" alt="Foto Profil">

        <!-- NAMA -->
        <h2>SMK KOMPUTAMA MAJENANG</h2>
        <p>AHMAD ABDUL LATIF</p>

        <!-- DATA -->
        <div class="info">
            <p><b>Kelas:</b> XII TKJ 2</p>
            <p><b>Sekolah:</b> SMK KOMPUTAMA MAJENANG</p>
            <p><b>Hobi:</b>MEMBACA RUNNING</p>
            <p><b>Cita-cita:</b>entepreneur</p>
        </div>

        <!-- SOSIAL MEDIA -->
        <div class="social">
            <a href="https://www.instagram.com/hy_aal_1?igsh=bGwxN2lhZzV3eXk0">instagram</a>
            
            
        </div>

        <footer>
            © 2026 by Ahmad abdlatif
        </footer>
    </div>

</body>
</html>
